<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinQuest — Financial Literacy Game{% endblock %}</title>
    <meta name="description" content="Master financial literacy through an interactive quiz journey. Learn budgeting, saving, investing, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="nav-logo">
            <span class="logo-icon">💰</span>
            <span class="logo-text">FinQuest</span>
        </a>
        <div class="nav-links">
            <a href="{{ url_for('game_map') }}" class="nav-link">🗺️ Journey Map</a>
            <a href="{{ url_for('reset') }}" class="nav-link nav-reset">↺ Reset</a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
